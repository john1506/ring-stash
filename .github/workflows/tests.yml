name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python
        run: python -m compileall -q custom_components tests

      - name: Check frontend JavaScript syntax
        run: node --check custom_components/ring_stash/frontend/ring-stash-viewer.js

      - name: Check whitespace errors
        run: git diff --check
